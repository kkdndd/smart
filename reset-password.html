<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>비밀번호 재설정</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
    <h1 class="text-lg font-bold text-slate-800 mb-4">새 비밀번호 설정</h1>
    <form id="form" class="space-y-3">
      <input type="password" id="password" required placeholder="새 비밀번호"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
      <p id="msg" class="text-sm hidden"></p>
      <button class="w-full bg-slate-800 text-white rounded-lg py-2 text-sm font-medium">변경하기</button>
    </form>
  </div>
<script>
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const password = document.getElementById("password").value;
  const { error } = await sb.auth.updateUser({ password });
  const msg = document.getElementById("msg");
  msg.classList.remove("hidden");
  if (error) { msg.className = "text-sm text-red-600"; msg.textContent = error.message; }
  else { msg.className = "text-sm text-green-600"; msg.textContent = "변경되었습니다. 다시 로그인해주세요.";
    setTimeout(()=>window.location.href="index.html", 1500);
  }
});
</script>
</body>
</html>
