<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>검토/승인 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-5xl mx-auto px-4 py-6 space-y-4">
  <h1 class="text-lg font-bold text-slate-800">검토/승인 대기 목표</h1>
  <div id="list-root" class="space-y-3"></div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE;
(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  if (!isHoldcoEditor(PROFILE)) { document.body.innerHTML = "<p class='p-6 text-red-600'>접근 권한이 없습니다.</p>"; return; }
  renderNav(PROFILE, "review");
  await load();
})();

async function load() {
  const { data: goals, error } = await sb.from("goals")
    .select("*, companies:company_id(name), business_units:business_unit_id(name)")
    .in("status", ["submitted"])
    .order("created_at");
  if (error) { console.error(error); return; }

  const focusGoal = new URLSearchParams(location.search).get("goal");

  document.getElementById("list-root").innerHTML = (goals||[]).map(g => `
    <div class="card p-5 ${focusGoal===g.id?'ring-2 ring-blue-400':''}">
      <div class="flex items-center justify-between mb-2">
        <div>
          <span class="font-semibold text-slate-800">${escapeHtml(g.companies.name)} · ${escapeHtml(g.business_units?g.business_units.name:'')}</span>
          <span class="ml-2 text-slate-600">${escapeHtml(g.strategy_name)}</span>
        </div>
        <a href="goal-detail.html?id=${g.id}" class="text-xs text-slate-500 hover:underline">상세보기</a>
      </div>
      <dl class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-slate-600 mb-3">
        <div><b>S</b> ${nl2br(g.specific_text)}</div>
        <div><b>M</b> ${nl2br(g.measurable_text)}</div>
        <div><b>A</b> ${nl2br(g.achievable_text)}</div>
        <div><b>R</b> ${nl2br(g.relevant_text)}</div>
        <div><b>T</b> ${nl2br(g.timebound_text)}</div>
      </dl>
      <textarea id="comment-${g.id}" rows="2" placeholder="검토 의견을 남겨주세요" class="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-2"></textarea>
      <div class="flex gap-2">
        <button onclick="doReview('${g.id}','approve')" class="text-sm bg-green-600 text-white rounded px-3 py-1.5">승인</button>
        <button onclick="doReview('${g.id}','request_revision')" class="text-sm bg-amber-500 text-white rounded px-3 py-1.5">수정요청</button>
        <button onclick="doReview('${g.id}','reject')" class="text-sm bg-red-600 text-white rounded px-3 py-1.5">반려</button>
      </div>
    </div>`).join("") || `<p class="text-sm text-slate-400">검토 대기중인 목표가 없습니다.</p>`;
}

async function doReview(goalId, action) {
  const comment = document.getElementById("comment-"+goalId).value;
  const statusMap = { approve: "approved", request_revision: "revision_requested", reject: "draft" };
  const { error: e1 } = await sb.from("goals").update({ status: statusMap[action] }).eq("id", goalId);
  if (e1) { alert("실패: " + e1.message); return; }
  const { error: e2 } = await sb.from("goal_reviews").insert({ goal_id: goalId, action, comment, reviewer_id: PROFILE.id });
  if (e2) { alert("실패: " + e2.message); return; }
  await load();
}
</script>
</body>
</html>
