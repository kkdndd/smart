<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>진행실적 입력 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-4">
  <h1 class="text-lg font-bold text-slate-800">진행실적 입력</h1>
  <div class="card p-2">
    <div class="flex items-center justify-between px-3 py-2">
      <label class="text-sm text-slate-600">목표를 선택하면 아래에 실적 입력란이 나타납니다</label>
      <input id="goal-filter" type="text" placeholder="검색" class="text-xs border border-slate-300 rounded px-2 py-1 w-40" />
    </div>
    <div id="goal-list" class="divide-y divide-slate-100 max-h-[132px] overflow-y-auto"></div>
  </div>
  <div id="goal-context" class="card p-4 hidden"></div>
  <div id="metrics-container" class="space-y-4"></div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE, YEAR = 2026, ALL_GOALS = [], SELECTED_GOAL_ID = null;
const params = new URLSearchParams(location.search);

(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  renderNav(PROFILE, "progress");
  await loadGoalOptions();
  const preselect = params.get("goal");
  selectGoal(preselect && ALL_GOALS.some(g => g.id === preselect) ? preselect : (ALL_GOALS[0]?.id || null));
  document.getElementById("goal-filter").addEventListener("input", renderGoalList);
})();

async function loadGoalOptions() {
  let q = sb.from("goals").select("id, strategy_name, seq_no, status, indicator_name, companies:company_id(name)").eq("year", YEAR).order("seq_no");
  if (!isHoldco(PROFILE)) q = q.eq("company_id", PROFILE.company_id);
  const { data } = await q;
  ALL_GOALS = data || [];
  renderGoalList();
}

function renderGoalList() {
  const filter = document.getElementById("goal-filter").value.trim().toLowerCase();
  const filtered = ALL_GOALS.filter(g => !filter || (g.strategy_name + " " + (g.indicator_name||"") + " " + g.companies.name).toLowerCase().includes(filter));
  document.getElementById("goal-list").innerHTML = filtered.map(g => `
    <div data-id="${g.id}" class="goal-list-item flex items-center justify-between px-3 py-2 cursor-pointer text-sm ${g.id===SELECTED_GOAL_ID?'bg-[var(--accent-soft)]':'hover:bg-[var(--surface-hover)]'}">
      <div class="min-w-0">
        <span class="font-medium text-slate-800">${isHoldco(PROFILE) ? escapeHtml(g.companies.name) + ' · ' : ''}${escapeHtml(g.strategy_name)}</span>
        <span class="text-xs text-slate-400 ml-1">${escapeHtml(g.indicator_name||'')}</span>
      </div>
      <span class="badge ${STATUS_BADGE_CLASS[g.status]} whitespace-nowrap">${STATUS_LABEL[g.status]}</span>
    </div>`).join("") || `<p class="text-sm text-slate-400 px-3 py-4">해당하는 목표가 없습니다.</p>`;

  document.querySelectorAll(".goal-list-item").forEach(el => {
    el.addEventListener("click", () => selectGoal(el.dataset.id));
  });
}

function selectGoal(goalId) {
  SELECTED_GOAL_ID = goalId;
  renderGoalList();
  if (goalId) {
    loadGoalContext(goalId);
    loadMetricsForGoal(goalId);
  } else {
    document.getElementById("goal-context").classList.add("hidden");
    document.getElementById("metrics-container").innerHTML = "";
  }
}

async function loadGoalContext(goalId) {
  const ctx = document.getElementById("goal-context");
  const { data: goal, error } = await sb.from("goals")
    .select("strategy_name, specific_text, measurable_text, achievable_text, relevant_text, timebound_text, status, companies:company_id(name), business_units:business_unit_id(name)")
    .eq("id", goalId).single();
  if (error || !goal) { ctx.classList.add("hidden"); return; }

  const field = (label, val) => `<div><dt class="text-[11px] font-medium mb-0.5" style="color:var(--text-tertiary)">${label}</dt><dd class="text-slate-700">${nl2br(val) || '<span style="color:var(--text-tertiary)">-</span>'}</dd></div>`;

  ctx.classList.remove("hidden");
  ctx.innerHTML = `
    <div class="flex items-center gap-2 mb-2">
      <h2 class="font-semibold text-slate-800">${escapeHtml(goal.strategy_name)}</h2>
      <span class="badge ${STATUS_BADGE_CLASS[goal.status]}">${STATUS_LABEL[goal.status]}</span>
    </div>
    <p class="text-xs text-slate-400 mb-3">${escapeHtml(goal.companies?.name||'')} · ${escapeHtml(goal.business_units?.name||'사업부 미지정')}</p>
    <dl class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
      ${field("S · Specific", goal.specific_text)}
      ${field("M · Measurable", goal.measurable_text)}
      ${field("A · Achievable", goal.achievable_text)}
      ${field("R · Relevant", goal.relevant_text)}
      ${field("T · Time-bound", goal.timebound_text)}
    </dl>`;
}

async function loadMetricsForGoal(goalId) {
  const canEdit = !isHoldco(PROFILE);
  const { data: metrics } = await sb.from("goal_metrics").select("*").eq("goal_id", goalId);
  const metricIds = (metrics||[]).map(m=>m.id);
  let progressByKey = {};
  let periodTargetsByKey = {};
  let metricsWithPeriodTargets = new Set();
  if (metricIds.length) {
    const { data: progress } = await sb.from("progress_entries").select("*, submitter:submitted_by(name,email)").in("goal_metric_id", metricIds);
    (progress||[]).forEach(p => progressByKey[p.goal_metric_id + "|" + p.period] = p);
    const { data: periodTargets } = await sb.from("goal_period_targets").select("*").in("goal_metric_id", metricIds);
    (periodTargets||[]).forEach(pt => {
      periodTargetsByKey[pt.goal_metric_id + "|" + pt.period] = pt.target_value;
      metricsWithPeriodTargets.add(pt.goal_metric_id);
    });
  }

  document.getElementById("metrics-container").innerHTML = (metrics||[]).map(m => {
    const periods = periodsForYear(YEAR, m.period_type);
    const isMilestone = m.metric_type === "milestone";
    const isQualitative = m.metric_type === "qualitative";
    const isNumeric = !isMilestone && !isQualitative;
    const rows = periods.map(period => {
      const key = m.id + "|" + period;
      const p = progressByKey[key];
      const periodTarget = periodTargetsByKey[key];
      const effTarget = periodTarget !== undefined ? periodTarget : m.target_value;
      const targetCell = isNumeric ? (effTarget !== null && effTarget !== undefined ? `${effTarget}${m.unit||''}` : '-') : '-';
      return `<tr class="border-b border-slate-100" data-metric="${m.id}" data-period="${period}">
        <td class="py-1.5 px-2 text-xs text-slate-500 w-[104px] whitespace-nowrap">${period}</td>
        <td class="py-1.5 px-2 text-xs text-slate-500 whitespace-nowrap">${targetCell}</td>
        <td class="py-1.5 px-2">
          ${isMilestone
            ? `<select class="val-milestone border border-slate-300 rounded px-2 py-1 text-sm" ${canEdit?'':'disabled'}>
                 <option value="">미입력</option>
                 <option value="true" ${p&&p.milestone_achieved===true?'selected':''}>완료</option>
                 <option value="false" ${p&&p.milestone_achieved===false?'selected':''}>미완료</option>
               </select>`
            : isQualitative
            ? `<div class="flex items-center gap-1">
                 <input type="number" min="0" max="100" step="1" class="val-actual border border-slate-300 rounded px-2 py-1 text-sm w-20" placeholder="진척도" value="${p&&p.actual_value!==null?p.actual_value:''}" ${canEdit?'':'disabled'} />
                 <span class="text-xs text-slate-400">%</span>
               </div>`
            : `<input type="number" step="any" class="val-actual border border-slate-300 rounded px-2 py-1 text-sm w-28" value="${p&&p.actual_value!==null?p.actual_value:''}" ${canEdit?'':'disabled'} />`}
        </td>
        <td class="py-1.5 px-2"><input class="val-note border border-slate-300 rounded px-2 py-1 text-sm w-full" placeholder="메모" value="${p&&p.note?escapeHtml(p.note):''}" ${canEdit?'':'disabled'} /></td>
        <td class="py-1.5 px-2"><input type="file" class="val-file text-xs" ${canEdit?'':'disabled'} />${p&&p.attachment_path?`<a href="#" class="download-link text-xs text-blue-600 underline ml-1 block truncate max-w-[120px]" data-path="${p.attachment_path}" data-name="${escapeHtml(p.attachment_name||'첨부파일')}">${escapeHtml(p.attachment_name||'첨부확인')}</a>`:''}</td>
        <td class="py-1.5 px-2 text-xs text-slate-400">${p&&p.submitter?escapeHtml(p.submitter.name||p.submitter.email)+' · '+new Date(p.updated_at).toLocaleDateString('ko-KR'):''}</td>
        <td class="py-1.5 px-2">${canEdit?`<button class="save-btn text-xs bg-[#3a4356] text-white rounded px-2 py-1">저장</button>`:''}</td>
      </tr>`;
    }).join("");
    let goalHint;
    if (isMilestone) goalHint = "완료 여부로 관리";
    else if (isQualitative) goalHint = "진척도(%) 자가평가로 관리";
    else {
      const parts = [];
      if (m.target_value !== null && m.target_value !== undefined) parts.push(`연간목표 ${m.target_value}${m.unit||''}`);
      if (metricsWithPeriodTargets.has(m.id)) parts.push("기간별 목표값 설정됨");
      goalHint = parts.length ? parts.join(" · ") : `목표값 미설정 ${m.unit||''}`;
    }
    return `<div class="card p-4 metric-card" data-metric="${m.id}">
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-medium text-sm text-slate-800">${escapeHtml(m.metric_name)} <span class="text-xs text-slate-400">(${escapeHtml(METRIC_TYPE_LABEL[m.metric_type]||'')} · ${goalHint})</span></h3>
        ${canEdit ? `<button class="bulk-save-btn text-xs bg-[#3a4356] text-white rounded px-3 py-1.5 hover:bg-[#2c3342] whitespace-nowrap">일괄저장</button>` : ''}
      </div>
      <div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-slate-400"><th class="px-2 py-1 w-[104px]">기간</th><th class="px-2 py-1">목표</th><th class="px-2 py-1">실적</th><th class="px-2 py-1">메모</th><th class="px-2 py-1">증빙파일</th><th class="px-2 py-1">입력자</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join("") || `<p class="text-sm text-slate-400">등록된 지표가 없습니다.</p>`;

  document.querySelectorAll(".save-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const tr = e.target.closest("tr");
      const ok = await saveProgress(tr, { force: true });
      if (ok) { alert("저장되었습니다."); loadMetricsForGoal(SELECTED_GOAL_ID); }
    });
  });
  document.querySelectorAll(".bulk-save-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const card = e.target.closest(".metric-card");
      const trs = card.querySelectorAll("tbody tr");
      btn.disabled = true;
      btn.textContent = "저장 중...";
      let count = 0;
      for (const tr of trs) {
        const ok = await saveProgress(tr);
        if (ok) count++;
      }
      alert(`${count}개 기간의 실적이 저장되었습니다.`);
      loadMetricsForGoal(SELECTED_GOAL_ID);
    });
  });
  document.querySelectorAll(".download-link").forEach(a => {
    a.addEventListener("click", async (e) => {
      e.preventDefault();
      const { data, error } = await sb.storage.from("progress-attachments").createSignedUrl(a.dataset.path, 60, { download: a.dataset.name });
      if (data) window.open(data.signedUrl, "_blank");
    });
  });
}

// Storage 객체 키는 영문/숫자/일부 기호만 허용되어, 한글 등 비ASCII 문자가 포함된 파일명은
// 업로드 시 "Invalid key" 오류가 난다. 저장 경로에는 안전한 이름만 쓰고, 원본 파일명은 별도 컬럼에 보관한다.
function sanitizeStorageFilename(name) {
  const dot = name.lastIndexOf(".");
  const ext = dot >= 0 ? name.slice(dot).replace(/[^a-zA-Z0-9.]/g, "") : "";
  let base = (dot >= 0 ? name.slice(0, dot) : name)
    .normalize("NFKD")
    .replace(/[^\x00-\x7F]/g, "")
    .replace(/[^a-zA-Z0-9_-]/g, "_")
    .replace(/_+/g, "_")
    .slice(0, 60);
  if (!base) base = "file";
  return base + ext;
}

async function saveProgress(tr, opts) {
  const force = opts && opts.force;
  const metricId = tr.dataset.metric;
  const period = tr.dataset.period;
  const milestoneSel = tr.querySelector(".val-milestone");
  const actualInput = tr.querySelector(".val-actual");
  const note = tr.querySelector(".val-note").value;
  const fileInput = tr.querySelector(".val-file");

  // 실적/메모/파일이 전부 비어있는 행은 건드리지 않는다 (일괄저장 시 빈 행까지 덮어쓰지 않기 위함)
  const hasActual = actualInput && actualInput.value !== "";
  const hasMilestone = milestoneSel && milestoneSel.value !== "";
  const hasFile = fileInput && fileInput.files && fileInput.files[0];
  const hasNote = note !== "";
  if (!force && !hasActual && !hasMilestone && !hasFile && !hasNote) return false;

  let attachment_path = null;
  let attachment_name = null;
  if (hasFile) {
    const file = fileInput.files[0];
    const safeName = sanitizeStorageFilename(file.name);
    const path = `${metricId}/${period}/${Date.now()}_${safeName}`;
    const { error: upErr } = await sb.storage.from("progress-attachments").upload(path, file, { upsert: true });
    if (upErr) { alert("파일 업로드 실패: " + upErr.message); return false; }
    attachment_path = path;
    attachment_name = file.name; // 원본 파일명(한글 포함)은 화면 표시용으로 별도 저장
  }

  const payload = {
    goal_metric_id: metricId,
    period,
    note,
    submitted_by: PROFILE.id,
    updated_by: PROFILE.id,
    updated_at: new Date().toISOString()
  };
  if (milestoneSel) payload.milestone_achieved = milestoneSel.value === "" ? null : milestoneSel.value === "true";
  if (actualInput) payload.actual_value = actualInput.value === "" ? null : Number(actualInput.value);
  if (attachment_path) { payload.attachment_path = attachment_path; payload.attachment_name = attachment_name; }

  const { error } = await sb.from("progress_entries").upsert(payload, { onConflict: "goal_metric_id,period" });
  if (error) { alert("저장 실패 (" + period + "): " + error.message); return false; }
  return true;
}
</script>
</body>
</html>
