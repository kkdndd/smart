<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>진행실적 입력 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-4">
  <h1 class="text-lg font-bold text-slate-800">진행실적 입력</h1>
  <div class="card p-2">
    <div class="flex items-center justify-between px-3 py-2">
      <label class="text-sm text-slate-600">목표를 선택하면 아래에 실적 입력란이 나타납니다</label>
      <input id="goal-filter" type="text" placeholder="검색" class="text-xs border border-slate-300 rounded px-2 py-1 w-40" />
    </div>
    <div id="goal-list" class="divide-y divide-slate-100 max-h-72 overflow-y-auto"></div>
  </div>
  <div id="metrics-container" class="space-y-4"></div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE, YEAR = 2026, ALL_GOALS = [], SELECTED_GOAL_ID = null;
const params = new URLSearchParams(location.search);

(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  renderNav(PROFILE, "progress");
  await loadGoalOptions();
  const preselect = params.get("goal");
  selectGoal(preselect && ALL_GOALS.some(g => g.id === preselect) ? preselect : (ALL_GOALS[0]?.id || null));
  document.getElementById("goal-filter").addEventListener("input", renderGoalList);
})();

async function loadGoalOptions() {
  let q = sb.from("goals").select("id, strategy_name, seq_no, status, indicator_name, companies:company_id(name)").eq("year", YEAR).order("seq_no");
  if (!isHoldco(PROFILE)) q = q.eq("company_id", PROFILE.company_id);
  const { data } = await q;
  ALL_GOALS = data || [];
  renderGoalList();
}

function renderGoalList() {
  const filter = document.getElementById("goal-filter").value.trim().toLowerCase();
  const filtered = ALL_GOALS.filter(g => !filter || (g.strategy_name + " " + (g.indicator_name||"") + " " + g.companies.name).toLowerCase().includes(filter));
  document.getElementById("goal-list").innerHTML = filtered.map(g => `
    <div data-id="${g.id}" class="goal-list-item flex items-center justify-between px-3 py-2 cursor-pointer text-sm ${g.id===SELECTED_GOAL_ID?'bg-[var(--accent-soft)]':'hover:bg-[var(--surface-hover)]'}">
      <div class="min-w-0">
        <span class="font-medium text-slate-800">${escapeHtml(g.companies.name)} · ${escapeHtml(g.strategy_name)}</span>
        <span class="text-xs text-slate-400 ml-1">${escapeHtml(g.indicator_name||'')}</span>
      </div>
      <span class="badge ${STATUS_BADGE_CLASS[g.status]} whitespace-nowrap">${STATUS_LABEL[g.status]}</span>
    </div>`).join("") || `<p class="text-sm text-slate-400 px-3 py-4">해당하는 목표가 없습니다.</p>`;

  document.querySelectorAll(".goal-list-item").forEach(el => {
    el.addEventListener("click", () => selectGoal(el.dataset.id));
  });
}

function selectGoal(goalId) {
  SELECTED_GOAL_ID = goalId;
  renderGoalList();
  if (goalId) loadMetricsForGoal(goalId);
  else document.getElementById("metrics-container").innerHTML = "";
}

async function loadMetricsForGoal(goalId) {
  const canEdit = !isHoldco(PROFILE);
  const { data: metrics } = await sb.from("goal_metrics").select("*").eq("goal_id", goalId);
  const metricIds = (metrics||[]).map(m=>m.id);
  let progressByKey = {};
  if (metricIds.length) {
    const { data: progress } = await sb.from("progress_entries").select("*, submitter:submitted_by(name,email)").in("goal_metric_id", metricIds);
    (progress||[]).forEach(p => progressByKey[p.goal_metric_id + "|" + p.period] = p);
  }

  document.getElementById("metrics-container").innerHTML = (metrics||[]).map(m => {
    const periods = periodsForYear(YEAR, m.period_type);
    const rows = periods.map(period => {
      const key = m.id + "|" + period;
      const p = progressByKey[key];
      const isMilestone = m.metric_type === "milestone";
      const isQualitative = m.metric_type === "qualitative";
      return `<tr class="border-b border-slate-100" data-metric="${m.id}" data-period="${period}">
        <td class="py-1.5 px-2 text-xs text-slate-500">${period}</td>
        <td class="py-1.5 px-2">
          ${isMilestone
            ? `<select class="val-milestone border border-slate-300 rounded px-2 py-1 text-sm" ${canEdit?'':'disabled'}>
                 <option value="">미입력</option>
                 <option value="true" ${p&&p.milestone_achieved===true?'selected':''}>완료</option>
                 <option value="false" ${p&&p.milestone_achieved===false?'selected':''}>미완료</option>
               </select>`
            : isQualitative
            ? `<div class="flex items-center gap-1">
                 <input type="number" min="0" max="100" step="1" class="val-actual border border-slate-300 rounded px-2 py-1 text-sm w-20" placeholder="진척도" value="${p&&p.actual_value!==null?p.actual_value:''}" ${canEdit?'':'disabled'} />
                 <span class="text-xs text-slate-400">%</span>
               </div>`
            : `<input type="number" step="any" class="val-actual border border-slate-300 rounded px-2 py-1 text-sm w-28" value="${p&&p.actual_value!==null?p.actual_value:''}" ${canEdit?'':'disabled'} />`}
        </td>
        <td class="py-1.5 px-2"><input class="val-note border border-slate-300 rounded px-2 py-1 text-sm w-full" placeholder="메모" value="${p&&p.note?escapeHtml(p.note):''}" ${canEdit?'':'disabled'} /></td>
        <td class="py-1.5 px-2"><input type="file" class="val-file text-xs" ${canEdit?'':'disabled'} />${p&&p.attachment_path?`<a href="#" class="download-link text-xs text-blue-600 underline ml-1" data-path="${p.attachment_path}">첨부확인</a>`:''}</td>
        <td class="py-1.5 px-2 text-xs text-slate-400">${p&&p.submitter?escapeHtml(p.submitter.name||p.submitter.email)+' · '+new Date(p.updated_at).toLocaleDateString('ko-KR'):''}</td>
        <td class="py-1.5 px-2">${canEdit?`<button class="save-btn text-xs bg-[#3a4356] text-white rounded px-2 py-1">저장</button>`:''}</td>
      </tr>`;
    }).join("");
    const goalHint = m.metric_type === "milestone" ? "완료 여부로 관리"
      : m.metric_type === "qualitative" ? "진척도(%) 자가평가로 관리"
      : `목표 ${m.target_value ?? '-'} ${m.unit||''}`;
    return `<div class="card p-4">
      <h3 class="font-medium text-sm text-slate-800 mb-2">${escapeHtml(m.metric_name)} <span class="text-xs text-slate-400">(${escapeHtml(METRIC_TYPE_LABEL[m.metric_type]||'')} · ${goalHint})</span></h3>
      <div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-slate-400"><th class="px-2 py-1">기간</th><th class="px-2 py-1">실적</th><th class="px-2 py-1">메모</th><th class="px-2 py-1">증빙파일</th><th class="px-2 py-1">입력자</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join("") || `<p class="text-sm text-slate-400">등록된 지표가 없습니다.</p>`;

  document.querySelectorAll(".save-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const tr = e.target.closest("tr");
      await saveProgress(tr);
    });
  });
  document.querySelectorAll(".download-link").forEach(a => {
    a.addEventListener("click", async (e) => {
      e.preventDefault();
      const { data, error } = await sb.storage.from("progress-attachments").createSignedUrl(a.dataset.path, 60);
      if (data) window.open(data.signedUrl, "_blank");
    });
  });
}

async function saveProgress(tr) {
  const metricId = tr.dataset.metric;
  const period = tr.dataset.period;
  const milestoneSel = tr.querySelector(".val-milestone");
  const actualInput = tr.querySelector(".val-actual");
  const note = tr.querySelector(".val-note").value;
  const fileInput = tr.querySelector(".val-file");

  let attachment_path = null;
  if (fileInput && fileInput.files && fileInput.files[0]) {
    const file = fileInput.files[0];
    const path = `${metricId}/${period}/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from("progress-attachments").upload(path, file, { upsert: true });
    if (upErr) { alert("파일 업로드 실패: " + upErr.message); return; }
    attachment_path = path;
  }

  const payload = {
    goal_metric_id: metricId,
    period,
    note,
    submitted_by: PROFILE.id,
    updated_by: PROFILE.id,
    updated_at: new Date().toISOString()
  };
  if (milestoneSel) payload.milestone_achieved = milestoneSel.value === "" ? null : milestoneSel.value === "true";
  if (actualInput) payload.actual_value = actualInput.value === "" ? null : Number(actualInput.value);
  if (attachment_path) payload.attachment_path = attachment_path;

  const { error } = await sb.from("progress_entries").upsert(payload, { onConflict: "goal_metric_id,period" });
  if (error) { alert("저장 실패: " + error.message); return; }
  alert("저장되었습니다.");
  loadMetricsForGoal(SELECTED_GOAL_ID);
}
</script>
</body>
</html>
