<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>목표 변경요청 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-6">
  <h1 class="text-lg font-bold text-slate-800">목표 변경요청</h1>

  <div id="create-section" class="card p-5 hidden">
    <h2 class="font-medium text-slate-800 mb-3">새 변경요청 작성 <span id="create-goal-name" class="text-sm text-slate-500"></span></h2>
    <textarea id="reason" rows="2" placeholder="변경 사유" class="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-3"></textarea>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm" id="field-grid"></div>

    <div id="metric-section" class="mt-5 hidden">
      <h3 class="text-sm font-medium text-slate-700 mb-2">핵심지표(KPI) 변경</h3>
      <div id="metric-grid" class="space-y-4"></div>
    </div>

    <p class="text-xs text-slate-400 my-2">비워둔 항목은 기존 값을 유지합니다.</p>
    <button id="submit-cr" class="bg-[#3a4356] text-white text-sm rounded px-4 py-2">변경요청 제출</button>
  </div>

  <template id="field-block-tpl">
    <div>
      <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500 mb-1">
        <input type="checkbox" class="field-check" />
        <span class="field-label"></span>
      </label>
      <p class="text-xs rounded p-2 mb-1 field-current" style="background:var(--surface-hover);color:var(--text-secondary)"></p>
      <textarea class="field-input w-full border border-slate-300 rounded px-2 py-1.5" placeholder="변경 후 값 입력" disabled></textarea>
    </div>
  </template>

  <div>
    <h2 class="font-medium text-slate-800 mb-2">변경요청 목록</h2>
    <div id="list-root" class="space-y-3"></div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE;
const params = new URLSearchParams(location.search);
const GOAL_ID = params.get("goal");

// 변경요청 작성 시점의 "현재 값"을 기억해두기 위한 캐시. 승인되면 원본 행이 새 값으로
// 덮어써지므로, 승인 이후에도 "변경 전" 값을 정확히 보여주려면 요청 제출 시점에
// 이 값들을 함께 저장해둬야 한다 (previous_* 컬럼).
let CURRENT_GOAL = null;
let CURRENT_METRICS_BY_ID = {};
let CURRENT_PERIOD_TARGETS_BY_METRIC = {};

const FIELD_DEFS = [
  { key: "strategy_name", label: "전략(목표)" },
  { key: "specific_text", label: "S · Specific" },
  { key: "measurable_text", label: "M · Measurable" },
  { key: "achievable_text", label: "A · Achievable" },
  { key: "relevant_text", label: "R · Relevant" },
  { key: "timebound_text", label: "T · Time-bound" },
];

const METRIC_FIELD_DEFS = [
  { key: "metric_name", label: "지표명", type: "text" },
  { key: "metric_type", label: "지표 유형", type: "select", options: Object.entries(METRIC_TYPE_LABEL) },
  { key: "unit", label: "단위", type: "text" },
  { key: "baseline_value", label: "기준값", type: "number" },
  { key: "target_value", label: "목표값", type: "number" },
  { key: "period_type", label: "기간 유형", type: "select", options: [["monthly","월별"],["quarterly","분기별"]] },
];

(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  renderNav(PROFILE, "cr");
  if (GOAL_ID && !isHoldco(PROFILE)) {
    const { data: goal } = await sb.from("goals").select("*").eq("id", GOAL_ID).single();
    if (goal) {
      CURRENT_GOAL = goal;
      document.getElementById("create-section").classList.remove("hidden");
      document.getElementById("create-goal-name").textContent = "· " + goal.strategy_name;
      renderFieldGrid(goal);
      const { data: metrics } = await sb.from("goal_metrics").select("*").eq("goal_id", GOAL_ID);
      (metrics||[]).forEach(m => CURRENT_METRICS_BY_ID[m.id] = m);
      const metricIds = (metrics||[]).map(x => x.id);
      let periodTargetsByMetric = {};
      if (metricIds.length) {
        const { data: pts } = await sb.from("goal_period_targets").select("*").in("goal_metric_id", metricIds);
        (pts||[]).forEach(p => {
          if (!periodTargetsByMetric[p.goal_metric_id]) periodTargetsByMetric[p.goal_metric_id] = {};
          periodTargetsByMetric[p.goal_metric_id][p.period] = p.target_value;
        });
      }
      CURRENT_PERIOD_TARGETS_BY_METRIC = periodTargetsByMetric;
      renderMetricGrid(metrics, periodTargetsByMetric);
    }
  }
  await load();
})();

// 기간(YYYY-MM 또는 YYYY-Qn)을 "N월"/"N분기" 형태로 보기 좋게 변환
function periodLabel(period) {
  const monthMatch = period.match(/-(\d{2})$/);
  if (monthMatch) return `${parseInt(monthMatch[1], 10)}월`;
  const qMatch = period.match(/-Q(\d)$/);
  if (qMatch) return `${qMatch[1]}분기`;
  return period;
}

function periodTargetGridHtml(m, ptMap) {
  const periods = periodsForYear(2026, m.period_type);
  return periods.map(p => {
    const current = ptMap && ptMap[p] !== undefined ? ptMap[p] : null;
    return `<div class="border border-slate-200 rounded p-1.5">
      <p class="text-[10px] text-slate-400 mb-0.5">${periodLabel(p)}</p>
      <p class="text-[10px] rounded px-1 py-0.5 mb-0.5" style="background:var(--surface-hover);color:var(--text-secondary)">${current ?? '-'}</p>
      <input type="number" step="any" class="mp-input w-full border border-slate-300 rounded px-1 py-0.5 text-xs" data-period="${p}" placeholder="변경 후" disabled />
    </div>`;
  }).join("");
}

function metricCurrentDisplay(m, key) {
  if (key === "metric_type") return escapeHtml(METRIC_TYPE_LABEL[m.metric_type] || m.metric_type || "-");
  if (key === "period_type") return m.period_type === "quarterly" ? "분기별" : "월별";
  const v = m[key];
  return (v === null || v === undefined || v === "") ? '<span style="color:var(--text-tertiary)">입력된 내용 없음</span>' : escapeHtml(String(v));
}

function metricInputHtml(f, m) {
  if (f.type === "select") {
    const opts = f.options.map(([val, label]) => `<option value="${val}" ${m[f.key]===val?'selected':''}>${escapeHtml(label)}</option>`).join("");
    return `<select class="mf-input w-full border border-slate-300 rounded px-2 py-1.5 text-sm" disabled>${opts}</select>`;
  }
  const type = f.type === "number" ? "number" : "text";
  return `<input type="${type}" step="any" class="mf-input w-full border border-slate-300 rounded px-2 py-1.5 text-sm" placeholder="변경 후 값 입력" disabled />`;
}

function renderMetricGrid(metrics, periodTargetsByMetric) {
  const section = document.getElementById("metric-section");
  const root = document.getElementById("metric-grid");
  if (!metrics || metrics.length === 0) { section.classList.add("hidden"); root.innerHTML = ""; return; }
  section.classList.remove("hidden");
  root.innerHTML = metrics.map(m => {
    const isNumeric = (m.metric_type === "increasing" || m.metric_type === "decreasing");
    const ptMap = (periodTargetsByMetric && periodTargetsByMetric[m.id]) || {};
    return `
    <div class="border border-slate-200 rounded p-3" data-metric-id="${m.id}">
      <p class="text-sm font-medium text-slate-800 mb-2">핵심지표: ${escapeHtml(m.metric_name)}</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
        ${METRIC_FIELD_DEFS.map(f => `
          <div data-field-wrap="${f.key}">
            <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500 mb-1">
              <input type="checkbox" class="mf-check" data-field="${f.key}" />
              <span>${f.label} (현재 값)</span>
            </label>
            <p class="text-xs rounded p-2 mb-1" style="background:var(--surface-hover);color:var(--text-secondary)">${metricCurrentDisplay(m, f.key)}</p>
            ${metricInputHtml(f, m)}
          </div>
        `).join("")}
      </div>
      ${isNumeric ? `
      <div class="mt-3 border-t border-slate-200 pt-2">
        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500 mb-2">
          <input type="checkbox" class="mp-check" />
          <span>월별/분기별 목표값 변경 (변경할 기간만 입력, 나머지는 비워두면 유지)</span>
        </label>
        <div class="mp-grid hidden grid grid-cols-3 sm:grid-cols-4 gap-2">${periodTargetGridHtml(m, ptMap)}</div>
      </div>` : ''}
    </div>`;
  }).join("");
  root.querySelectorAll(".mf-check").forEach(cb => {
    cb.addEventListener("change", () => {
      const wrap = cb.closest("[data-field-wrap]");
      const input = wrap.querySelector(".mf-input");
      input.disabled = !cb.checked;
      input.classList.toggle("opacity-50", !cb.checked);
      if (cb.checked) input.focus();
      else input.value = "";
    });
  });
  root.querySelectorAll(".mp-check").forEach(cb => {
    cb.addEventListener("change", () => {
      const card = cb.closest("[data-metric-id]");
      const grid = card.querySelector(".mp-grid");
      grid.classList.toggle("hidden", !cb.checked);
      grid.querySelectorAll(".mp-input").forEach(inp => {
        inp.disabled = !cb.checked;
        inp.classList.toggle("opacity-50", !cb.checked);
      });
    });
  });
}

function renderFieldGrid(goal) {
  const grid = document.getElementById("field-grid");
  const tpl = document.getElementById("field-block-tpl");
  grid.innerHTML = "";
  FIELD_DEFS.forEach(f => {
    const node = tpl.content.cloneNode(true);
    const wrap = node.querySelector("div");
    wrap.dataset.field = f.key;
    node.querySelector(".field-label").textContent = f.label + " (현재 값)";
    node.querySelector(".field-current").innerHTML = nl2br(goal[f.key]) || '<span style="color:var(--text-tertiary)">입력된 내용 없음</span>';
    const checkbox = node.querySelector(".field-check");
    const textarea = node.querySelector(".field-input");
    checkbox.addEventListener("change", () => {
      textarea.disabled = !checkbox.checked;
      textarea.classList.toggle("opacity-50", !checkbox.checked);
      if (checkbox.checked) textarea.focus();
      else textarea.value = "";
    });
    grid.appendChild(node);
  });
}

document.getElementById("submit-cr")?.addEventListener("click", async () => {
  const proposed = {};
  const previous = {};
  const proposedMetrics = {};
  const previousMetrics = {};
  let missingValue = false;
  document.querySelectorAll("#field-grid > div").forEach(wrap => {
    const checked = wrap.querySelector(".field-check").checked;
    if (!checked) return;
    const v = wrap.querySelector(".field-input").value.trim();
    if (!v) { missingValue = true; return; }
    proposed[wrap.dataset.field] = v;
    previous[wrap.dataset.field] = CURRENT_GOAL ? (CURRENT_GOAL[wrap.dataset.field] ?? null) : null;
  });
  const proposedPeriodChanges = {};
  const previousPeriodChanges = {};
  document.querySelectorAll("#metric-grid > div[data-metric-id]").forEach(card => {
    const metricId = card.dataset.metricId;
    const fields = {};
    const prevFields = {};
    card.querySelectorAll("[data-field-wrap]").forEach(wrap => {
      const checkbox = wrap.querySelector(".mf-check");
      if (!checkbox.checked) return;
      const v = wrap.querySelector(".mf-input").value;
      if (v === null || String(v).trim() === "") { missingValue = true; return; }
      fields[checkbox.dataset.field] = v;
      const curMetric = CURRENT_METRICS_BY_ID[metricId];
      prevFields[checkbox.dataset.field] = curMetric ? (curMetric[checkbox.dataset.field] ?? null) : null;
    });
    if (Object.keys(fields).length) { proposedMetrics[metricId] = fields; previousMetrics[metricId] = prevFields; }

    const mpCheck = card.querySelector(".mp-check");
    if (mpCheck && mpCheck.checked) {
      const periods = {};
      const prevPeriods = {};
      const curPtMap = CURRENT_PERIOD_TARGETS_BY_METRIC[metricId] || {};
      card.querySelectorAll(".mp-input").forEach(inp => {
        const v = inp.value;
        if (v !== "" && v !== null) {
          periods[inp.dataset.period] = v;
          prevPeriods[inp.dataset.period] = curPtMap[inp.dataset.period] ?? null;
        }
      });
      if (Object.keys(periods).length) { proposedPeriodChanges[metricId] = periods; previousPeriodChanges[metricId] = prevPeriods; }
    }
  });
  if (missingValue) { alert("변경 체크한 항목에는 변경 후 값을 입력해주세요."); return; }
  if (Object.keys(proposed).length === 0 && Object.keys(proposedMetrics).length === 0 && Object.keys(proposedPeriodChanges).length === 0) { alert("변경할 항목을 하나 이상 체크하고 값을 입력해주세요."); return; }
  const { error } = await sb.from("change_requests").insert({
    goal_id: GOAL_ID, requested_by: PROFILE.id,
    reason: document.getElementById("reason").value,
    proposed_changes: proposed,
    previous_changes: Object.keys(previous).length ? previous : null,
    proposed_metric_changes: Object.keys(proposedMetrics).length ? proposedMetrics : null,
    previous_metric_changes: Object.keys(previousMetrics).length ? previousMetrics : null,
    proposed_period_target_changes: Object.keys(proposedPeriodChanges).length ? proposedPeriodChanges : null,
    previous_period_target_changes: Object.keys(previousPeriodChanges).length ? previousPeriodChanges : null
  });
  if (error) { alert("제출 실패: " + error.message); return; }
  alert("변경요청이 제출되었습니다.");
  window.location.href = "goal-detail.html?id=" + GOAL_ID;
});

async function load() {
  let q = sb.from("change_requests").select("*, goals:goal_id(strategy_name, specific_text, measurable_text, achievable_text, relevant_text, timebound_text, companies:company_id(name)), requester:requested_by(name,email)").order("created_at", { ascending: false });
  const { data, error } = await q;
  if (error) { console.error(error); return; }

  const metricIds = new Set();
  (data||[]).forEach(cr => {
    Object.keys(cr.proposed_metric_changes || {}).forEach(id => metricIds.add(id));
    Object.keys(cr.proposed_period_target_changes || {}).forEach(id => metricIds.add(id));
  });
  let metricsById = {};
  let periodTargetsByKey = {};
  if (metricIds.size) {
    const idsArr = Array.from(metricIds);
    const { data: metrics } = await sb.from("goal_metrics").select("*").in("id", idsArr);
    (metrics||[]).forEach(m => metricsById[m.id] = m);
    const { data: pts } = await sb.from("goal_period_targets").select("*").in("goal_metric_id", idsArr);
    (pts||[]).forEach(p => { periodTargetsByKey[p.goal_metric_id + "|" + p.period] = p.target_value; });
  }

  document.getElementById("list-root").innerHTML = (data||[]).map(cr => {
    const canDecide = isHoldcoEditor(PROFILE) && cr.status === "pending";
    const goal = cr.goals || {};
    const changeRows = Object.entries(cr.proposed_changes || {}).map(([key, newVal]) => {
      const def = FIELD_DEFS.find(f => f.key === key);
      const label = def ? def.label : key;
      const hasSnapshot = cr.previous_changes && Object.prototype.hasOwnProperty.call(cr.previous_changes, key);
      const oldVal = hasSnapshot ? cr.previous_changes[key] : goal[key];
      return `<div class="border border-slate-200 rounded p-2 mb-1.5">
        <p class="text-[11px] font-medium mb-1" style="color:var(--text-tertiary)">${escapeHtml(label)}</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs">
          <div>
            <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 전</p>
            <p class="rounded p-1.5" style="background:var(--red-soft);color:var(--text-secondary)">${nl2br(oldVal) || '<span style="color:var(--text-tertiary)">(없음)</span>'}</p>
          </div>
          <div>
            <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 후</p>
            <p class="rounded p-1.5" style="background:var(--green-soft);color:var(--text-secondary)">${nl2br(newVal)}</p>
          </div>
        </div>
      </div>`;
    }).join("");

    const metricChangeRows = [];
    Object.entries(cr.proposed_metric_changes || {}).forEach(([metricId, fields]) => {
      const m = metricsById[metricId];
      const metricLabel = m ? m.metric_name : "(삭제된 지표)";
      const prevFields = (cr.previous_metric_changes && cr.previous_metric_changes[metricId]) || null;
      Object.entries(fields).forEach(([key, newVal]) => {
        const def = METRIC_FIELD_DEFS.find(f => f.key === key);
        const label = def ? def.label : key;
        const hasSnapshot = prevFields && Object.prototype.hasOwnProperty.call(prevFields, key);
        const oldRaw = hasSnapshot ? prevFields[key] : (m ? m[key] : undefined);
        let oldDisplay, newDisplay;
        if (key === "metric_type") {
          oldDisplay = oldRaw ? escapeHtml(METRIC_TYPE_LABEL[oldRaw]||oldRaw) : "-";
          newDisplay = escapeHtml(METRIC_TYPE_LABEL[newVal] || newVal);
        } else if (key === "period_type") {
          oldDisplay = oldRaw ? (oldRaw === "quarterly" ? "분기별" : "월별") : "-";
          newDisplay = newVal === "quarterly" ? "분기별" : "월별";
        } else {
          oldDisplay = (oldRaw !== null && oldRaw !== undefined && oldRaw !== "") ? escapeHtml(String(oldRaw)) : '<span style="color:var(--text-tertiary)">(없음)</span>';
          newDisplay = escapeHtml(String(newVal));
        }
        metricChangeRows.push(`<div class="border border-slate-200 rounded p-2 mb-1.5">
          <p class="text-[11px] font-medium mb-1" style="color:var(--text-tertiary)">핵심지표 [${escapeHtml(metricLabel)}] · ${escapeHtml(label)}</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs">
            <div>
              <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 전</p>
              <p class="rounded p-1.5" style="background:var(--red-soft);color:var(--text-secondary)">${oldDisplay}</p>
            </div>
            <div>
              <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 후</p>
              <p class="rounded p-1.5" style="background:var(--green-soft);color:var(--text-secondary)">${newDisplay}</p>
            </div>
          </div>
        </div>`);
      });
    });

    const periodChangeRows = [];
    Object.entries(cr.proposed_period_target_changes || {}).forEach(([metricId, periods]) => {
      const m = metricsById[metricId];
      const metricLabel = m ? m.metric_name : "(삭제된 지표)";
      const prevPeriods = (cr.previous_period_target_changes && cr.previous_period_target_changes[metricId]) || null;
      Object.entries(periods).forEach(([period, newVal]) => {
        const hasSnapshot = prevPeriods && Object.prototype.hasOwnProperty.call(prevPeriods, period);
        const oldVal = hasSnapshot ? prevPeriods[period] : periodTargetsByKey[metricId + "|" + period];
        const oldDisplay = (oldVal !== undefined && oldVal !== null) ? escapeHtml(String(oldVal)) : '<span style="color:var(--text-tertiary)">(미설정, 연간목표값 사용)</span>';
        periodChangeRows.push(`<div class="border border-slate-200 rounded p-2 mb-1.5">
          <p class="text-[11px] font-medium mb-1" style="color:var(--text-tertiary)">핵심지표 [${escapeHtml(metricLabel)}] · ${periodLabel(period)} 목표값</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs">
            <div>
              <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 전</p>
              <p class="rounded p-1.5" style="background:var(--red-soft);color:var(--text-secondary)">${oldDisplay}</p>
            </div>
            <div>
              <p class="text-[10px] mb-0.5" style="color:var(--text-tertiary)">변경 후</p>
              <p class="rounded p-1.5" style="background:var(--green-soft);color:var(--text-secondary)">${escapeHtml(String(newVal))}</p>
            </div>
          </div>
        </div>`);
      });
    });

    const totalCount = Object.keys(cr.proposed_changes||{}).length + metricChangeRows.length + periodChangeRows.length;

    return `<div class="card p-4">
      <div class="flex items-center justify-between mb-1">
        <span class="font-medium text-slate-800">${escapeHtml(goal.companies?.name||'')} · ${escapeHtml(goal.strategy_name||'')}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${cr.status==='pending'?'bg-amber-100 text-amber-700':cr.status==='approved'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${{pending:'대기중',approved:'승인됨',rejected:'반려됨'}[cr.status]}</span>
      </div>
      <p class="text-sm text-slate-600 mb-1">사유: ${escapeHtml(cr.reason||'(작성 안 함)')}</p>
      <p class="text-xs text-slate-400 mb-3">요청자: ${cr.requester?escapeHtml(cr.requester.name||cr.requester.email):''} · ${new Date(cr.created_at).toLocaleString('ko-KR')}</p>
      <p class="text-xs font-medium mb-1.5" style="color:var(--text-secondary)">변경 요청 항목 (${totalCount}건)</p>
      ${changeRows}${metricChangeRows.join("")}${periodChangeRows.join("")}
      ${totalCount === 0 ? '<p class="text-xs text-slate-400">변경 항목 없음</p>' : ''}
      ${canDecide ? `<div class="flex gap-2 mt-3">
        <button onclick="decide('${cr.id}', true)" class="text-sm bg-green-600 text-white rounded px-3 py-1.5">승인 및 적용</button>
        <button onclick="decide('${cr.id}', false)" class="text-sm bg-red-600 text-white rounded px-3 py-1.5">반려</button>
      </div>` : ''}
    </div>`;
  }).join("") || `<p class="text-sm text-slate-400">변경요청이 없습니다.</p>`;
}

async function decide(crId, approve) {
  const { data: cr, error } = await sb.from("change_requests").select("*").eq("id", crId).single();
  if (error || !cr) { alert("불러오기 실패"); return; }

  if (approve) {
    if (cr.proposed_changes && Object.keys(cr.proposed_changes).length) {
      const { error: gErr } = await sb.from("goals").update(cr.proposed_changes).eq("id", cr.goal_id);
      if (gErr) { alert("목표 적용 실패: " + gErr.message); return; }
    }
    for (const [metricId, fields] of Object.entries(cr.proposed_metric_changes || {})) {
      const { error: mErr } = await sb.from("goal_metrics").update(fields).eq("id", metricId);
      if (mErr) { alert("핵심지표 적용 실패: " + mErr.message); return; }
    }
    for (const [metricId, periods] of Object.entries(cr.proposed_period_target_changes || {})) {
      const rows = Object.entries(periods).map(([period, target_value]) => ({ goal_metric_id: metricId, period, target_value }));
      if (rows.length) {
        const { error: ptErr } = await sb.from("goal_period_targets").upsert(rows, { onConflict: "goal_metric_id,period" });
        if (ptErr) { alert("월별/분기별 목표값 적용 실패: " + ptErr.message); return; }
      }
    }
  }
  const { error: crErr } = await sb.from("change_requests").update({
    status: approve ? "approved" : "rejected",
    reviewed_by: PROFILE.id,
    reviewed_at: new Date().toISOString()
  }).eq("id", crId);
  if (crErr) { alert("처리 실패: " + crErr.message); return; }
  await load();
}
</script>
