<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>목표 변경요청 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-6">
  <h1 class="text-lg font-bold text-slate-800">목표 변경요청</h1>

  <div id="create-section" class="card p-5 hidden">
    <h2 class="font-medium text-slate-800 mb-3">새 변경요청 작성 <span id="create-goal-name" class="text-sm text-slate-500"></span></h2>
    <textarea id="reason" rows="2" placeholder="변경 사유" class="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-3"></textarea>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm" id="field-grid"></div>
    <p class="text-xs text-slate-400 my-2">비워둔 항목은 기존 값을 유지합니다.</p>
    <button id="submit-cr" class="bg-[#3a4356] text-white text-sm rounded px-4 py-2">변경요청 제출</button>
  </div>

  <template id="field-block-tpl">
    <div>
      <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500 mb-1">
        <input type="checkbox" class="field-check" />
        <span class="field-label"></span>
      </label>
      <p class="text-xs rounded p-2 mb-1 field-current" style="background:var(--surface-hover);color:var(--text-secondary)"></p>
      <textarea class="field-input w-full border border-slate-300 rounded px-2 py-1.5" placeholder="변경 후 값 입력" disabled></textarea>
    </div>
  </template>

  <div>
    <h2 class="font-medium text-slate-800 mb-2">변경요청 목록</h2>
    <div id="list-root" class="space-y-3"></div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE;
const params = new URLSearchParams(location.search);
const GOAL_ID = params.get("goal");

const FIELD_DEFS = [
  { key: "strategy_name", label: "전략(목표)" },
  { key: "specific_text", label: "S · Specific" },
  { key: "measurable_text", label: "M · Measurable" },
  { key: "achievable_text", label: "A · Achievable" },
  { key: "relevant_text", label: "R · Relevant" },
  { key: "timebound_text", label: "T · Time-bound" },
];

(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  renderNav(PROFILE, "cr");
  if (GOAL_ID && !isHoldco(PROFILE)) {
    const { data: goal } = await sb.from("goals").select("*").eq("id", GOAL_ID).single();
    if (goal) {
      document.getElementById("create-section").classList.remove("hidden");
      document.getElementById("create-goal-name").textContent = "· " + goal.strategy_name;
      renderFieldGrid(goal);
    }
  }
  await load();
})();

function renderFieldGrid(goal) {
  const grid = document.getElementById("field-grid");
  const tpl = document.getElementById("field-block-tpl");
  grid.innerHTML = "";
  FIELD_DEFS.forEach(f => {
    const node = tpl.content.cloneNode(true);
    const wrap = node.querySelector("div");
    wrap.dataset.field = f.key;
    node.querySelector(".field-label").textContent = f.label + " (현재 값)";
    node.querySelector(".field-current").innerHTML = nl2br(goal[f.key]) || '<span style="color:var(--text-tertiary)">입력된 내용 없음</span>';
    const checkbox = node.querySelector(".field-check");
    const textarea = node.querySelector(".field-input");
    checkbox.addEventListener("change", () => {
      textarea.disabled = !checkbox.checked;
      textarea.classList.toggle("opacity-50", !checkbox.checked);
      if (checkbox.checked) textarea.focus();
      else textarea.value = "";
    });
    grid.appendChild(node);
  });
}

document.getElementById("submit-cr")?.addEventListener("click", async () => {
  const proposed = {};
  let missingValue = false;
  document.querySelectorAll("#field-grid > div").forEach(wrap => {
    const checked = wrap.querySelector(".field-check").checked;
    if (!checked) return;
    const v = wrap.querySelector(".field-input").value.trim();
    if (!v) { missingValue = true; return; }
    proposed[wrap.dataset.field] = v;
  });
  if (missingValue) { alert("변경 체크한 항목에는 변경 후 값을 입력해주세요."); return; }
  if (Object.keys(proposed).length === 0) { alert("변경할 항목을 하나 이상 체크하고 값을 입력해주세요."); return; }
  const { error } = await sb.from("change_requests").insert({
    goal_id: GOAL_ID, requested_by: PROFILE.id,
    reason: document.getElementById("reason").value,
    proposed_changes: proposed
  });
  if (error) { alert("제출 실패: " + error.message); return; }
  alert("변경요청이 제출되었습니다.");
  window.location.href = "goal-detail.html?id=" + GOAL_ID;
});

async function load() {
  let q = sb.from("change_requests").select("*, goals:goal_id(strategy_name, companies:company_id(name)), requester:requested_by(name,email)").order("created_at", { ascending: false });
  const { data, error } = await q;
  if (error) { console.error(error); return; }

  document.getElementById("list-root").innerHTML = (data||[]).map(cr => {
    const canDecide = isHoldcoEditor(PROFILE) && cr.status === "pending";
    return `<div class="card p-4">
      <div class="flex items-center justify-between mb-1">
        <span class="font-medium text-slate-800">${escapeHtml(cr.goals?.companies?.name||'')} · ${escapeHtml(cr.goals?.strategy_name||'')}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${cr.status==='pending'?'bg-amber-100 text-amber-700':cr.status==='approved'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${{pending:'대기중',approved:'승인됨',rejected:'반려됨'}[cr.status]}</span>
      </div>
      <p class="text-sm text-slate-600 mb-1">사유: ${escapeHtml(cr.reason||'')}</p>
      <p class="text-xs text-slate-400 mb-2">요청자: ${cr.requester?escapeHtml(cr.requester.name||cr.requester.email):''} · ${new Date(cr.created_at).toLocaleString('ko-KR')}</p>
      <pre class="text-xs rounded p-2 overflow-x-auto">${escapeHtml(JSON.stringify(cr.proposed_changes, null, 2))}</pre>
      ${canDecide ? `<div class="flex gap-2 mt-2">
        <button onclick="decide('${cr.id}', true)" class="text-sm bg-green-600 text-white rounded px-3 py-1.5">승인 및 적용</button>
        <button onclick="decide('${cr.id}', false)" class="text-sm bg-red-600 text-white rounded px-3 py-1.5">반려</button>
      </div>` : ''}
    </div>`;
  }).join("") || `<p class="text-sm text-slate-400">변경요청이 없습니다.</p>`;
}

async function decide(crId, approve) {
  const { data: cr, error } = await sb.from("change_requests").select("*").eq("id", crId).single();
  if (error || !cr) { alert("불러오기 실패"); return; }

  if (approve) {
    const { error: gErr } = await sb.from("goals").update(cr.proposed_changes).eq("id", cr.goal_id);
    if (gErr) { alert("목표 적용 실패: " + gErr.message); return; }
  }
  const { error: crErr } = await sb.from("change_requests").update({
    status: approve ? "approved" : "rejected",
    reviewed_by: PROFILE.id,
    reviewed_at: new Date().toISOString()
  }).eq("id", crId);
  if (crErr) { alert("처리 실패: " + crErr.message); return; }
  await load();
}
</script>
</body>
</html>
