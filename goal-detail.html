<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>목표 상세 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-4">
  <div class="flex items-center justify-between">
    <a href="goals.html" class="text-sm text-slate-500 hover:underline">← 목록으로</a>
    <div id="header-actions" class="flex gap-2"></div>
  </div>

  <div class="card p-6">
    <div class="flex items-center gap-2 mb-1">
      <h1 id="title" class="text-lg font-bold text-slate-800"></h1>
      <span id="status-badge" class="px-2 py-0.5 rounded-full text-xs"></span>
    </div>
    <p id="meta" class="text-xs text-slate-400 mb-4"></p>
    <dl class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
      <div><dt class="font-medium text-slate-500 mb-1">S · Specific</dt><dd id="f_specific" class="text-slate-700"></dd></div>
      <div><dt class="font-medium text-slate-500 mb-1">M · Measurable</dt><dd id="f_measurable" class="text-slate-700"></dd></div>
      <div><dt class="font-medium text-slate-500 mb-1">A · Achievable</dt><dd id="f_achievable" class="text-slate-700"></dd></div>
      <div><dt class="font-medium text-slate-500 mb-1">R · Relevant</dt><dd id="f_relevant" class="text-slate-700"></dd></div>
      <div><dt class="font-medium text-slate-500 mb-1">T · Time-bound</dt><dd id="f_timebound" class="text-slate-700"></dd></div>
      <div><dt class="font-medium text-slate-500 mb-1">후속조치</dt><dd id="f_followup" class="text-slate-700"></dd></div>
    </dl>
  </div>

  <div class="card p-6">
    <h2 class="font-semibold text-slate-800 mb-3">핵심지표(KPI) 및 달성 현황</h2>
    <div id="metrics-root" class="space-y-3"></div>
  </div>

  <div class="card p-6">
    <h2 class="font-semibold text-slate-800 mb-3">검토/승인 이력</h2>
    <div id="reviews-root" class="space-y-2 text-sm"></div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE, GOAL_ID = new URLSearchParams(location.search).get("id"), GOAL;

(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  renderNav(PROFILE, "goals");
  await load();
})();

async function load() {
  const { data: goal, error } = await sb.from("goals").select("*, companies:company_id(name), business_units:business_unit_id(name)").eq("id", GOAL_ID).single();
  if (error || !goal) { document.body.innerHTML = "<p class='p-6 text-red-600'>목표를 불러올 수 없습니다.</p>"; return; }
  GOAL = goal;
  document.getElementById("title").textContent = goal.strategy_name;
  document.getElementById("status-badge").className = "px-2 py-0.5 rounded-full text-xs " + STATUS_BADGE_CLASS[goal.status];
  document.getElementById("status-badge").textContent = STATUS_LABEL[goal.status];
  document.getElementById("meta").textContent = `${goal.companies.name} · ${goal.business_units ? goal.business_units.name : '사업부 미지정'} · 관리번호 ${goal.seq_no ?? '-'}`;
  document.getElementById("f_specific").innerHTML = nl2br(goal.specific_text) || '-';
  document.getElementById("f_measurable").innerHTML = nl2br(goal.measurable_text) || '-';
  document.getElementById("f_achievable").innerHTML = nl2br(goal.achievable_text) || '-';
  document.getElementById("f_relevant").innerHTML = nl2br(goal.relevant_text) || '-';
  document.getElementById("f_timebound").innerHTML = nl2br(goal.timebound_text) || '-';
  document.getElementById("f_followup").innerHTML = nl2br(goal.follow_up_action) || '-';

  renderActions();
  await loadMetrics();
  await loadReviews();
}

function renderActions() {
  const actions = [];
  const editable = !isHoldco(PROFILE) && (GOAL.status === "draft" || GOAL.status === "revision_requested");
  if (editable) actions.push(`<a href="goal-form.html?id=${GOAL.id}" class="text-sm bg-[#3a4356] text-white rounded px-3 py-1.5">수정</a>`);
  if (!isHoldco(PROFILE) && (GOAL.status === "approved" || GOAL.status === "locked")) {
    actions.push(`<a href="change-requests.html?goal=${GOAL.id}" class="text-sm bg-white border border-slate-300 rounded px-3 py-1.5">변경요청</a>`);
  }
  actions.push(`<a href="progress.html?goal=${GOAL.id}" class="text-sm bg-white border border-slate-300 rounded px-3 py-1.5">진행실적 입력</a>`);
  if (isHoldcoEditor(PROFILE) && GOAL.status === "submitted") {
    actions.push(`<a href="review.html?goal=${GOAL.id}" class="text-sm bg-blue-600 text-white rounded px-3 py-1.5">검토하기</a>`);
  }
  document.getElementById("header-actions").innerHTML = actions.join("");
}

async function loadMetrics() {
  const { data: metrics } = await sb.from("goal_metrics").select("*").eq("goal_id", GOAL_ID);
  const root = document.getElementById("metrics-root");
  if (!metrics || metrics.length === 0) { root.innerHTML = `<p class="text-sm text-slate-400">등록된 지표가 없습니다.</p>`; return; }

  const metricIds = metrics.map(m => m.id);
  const { data: progress } = await sb.from("progress_entries").select("*").in("goal_metric_id", metricIds).order("period", { ascending: true });

  root.innerHTML = metrics.map(m => {
    const entriesAsc = (progress||[]).filter(p => p.goal_metric_id === m.id);
    const latest = entriesAsc[entriesAsc.length - 1];
    const rate = latest ? calcAchievementRate(m, latest.actual_value, latest.milestone_achieved) : null;
    const history = entriesAsc.map(p => `
      <div class="px-3 py-1.5 border-b border-slate-100 last:border-b-0">
        <div class="flex items-center justify-between">
          <span class="text-xs text-slate-500">${p.period}</span>
          <span class="text-sm font-medium text-slate-800">${p.milestone_achieved!==null ? (p.milestone_achieved?'완료':'미완료') : (p.actual_value ?? '-')}</span>
        </div>
        ${p.note ? `<p class="text-xs text-slate-500 mt-0.5">${nl2br(p.note)}</p>` : ''}
      </div>`).join("");
    return `<div class="border border-slate-200 rounded p-3">
      <div class="flex items-center justify-between mb-1">
        <span class="font-medium text-sm text-slate-800">${escapeHtml(m.metric_name)} <span class="text-xs text-slate-400">(${METRIC_TYPE_LABEL[m.metric_type]} · ${m.period_type==='monthly'?'월별':'분기별'})</span></span>
        <span class="px-2 py-0.5 rounded-full text-xs ${rateColorClass(rate)}">${rate===null?'실적없음':rate+'%'}</span>
      </div>
      <p class="text-xs text-slate-500 mb-2">${
        m.metric_type === 'milestone' ? '완료 여부로 관리되는 정성 지표입니다'
        : m.metric_type === 'qualitative' ? '담당자가 매 기간 진척도(%)를 자가평가하는 정성 지표입니다'
        : `기준값 ${m.baseline_value ?? '-'} → 목표값 ${m.target_value ?? '-'} ${m.unit || ''}`
      }</p>
      <div class="rounded border border-slate-100 divide-y divide-slate-100">${history || '<p class="text-xs text-slate-400 px-3 py-2">입력된 실적이 없습니다</p>'}</div>
    </div>`;
  }).join("");
}

async function loadReviews() {
  const { data: reviews } = await sb.from("goal_reviews").select("*, reviewer:reviewer_id(name,email)").eq("goal_id", GOAL_ID).order("created_at", { ascending: false });
  const root = document.getElementById("reviews-root");
  const labelMap = { submit: "제출", approve: "승인", reject: "반려", request_revision: "수정요청" };
  root.innerHTML = (reviews||[]).map(r => `
    <div class="flex items-start gap-2 border-b border-slate-100 pb-2">
      <span class="text-xs text-slate-400 whitespace-nowrap">${new Date(r.created_at).toLocaleString('ko-KR')}</span>
      <span class="font-medium">${labelMap[r.action]||r.action}</span>
      <span class="text-slate-500">${r.reviewer ? escapeHtml(r.reviewer.name||r.reviewer.email) : ''}</span>
      <span class="text-slate-600">${escapeHtml(r.comment||'')}</span>
    </div>`).join("") || `<p class="text-sm text-slate-400">이력이 없습니다.</p>`;
}
</script>
</body>
</html>
