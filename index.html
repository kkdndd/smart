<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대교홀딩스 SMART 사업계획 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm card p-8">
    <h1 class="text-xl font-bold text-slate-800 mb-1">대교홀딩스</h1>
    <p class="text-sm text-slate-500 mb-6">SMART 기반 사업계획 관리 시스템</p>

    <form id="login-form" class="space-y-3">
      <div>
        <label class="block text-sm text-slate-600 mb-1">이메일 (@daekyo.co.kr)</label>
        <input type="email" id="email" required placeholder="name@daekyo.co.kr"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">비밀번호</label>
        <input type="password" id="password" required
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
      <p id="error-msg" class="text-sm text-red-600 hidden"></p>
      <button type="submit" class="w-full bg-[#3a4356] text-white rounded-lg py-2 text-sm font-medium hover:bg-[#2c3342]">
        로그인
      </button>
    </form>
    <button id="reset-btn" class="mt-3 text-xs text-slate-500 underline">비밀번호를 잊으셨나요?</button>
    <p class="mt-6 text-xs text-slate-400 leading-relaxed">
      계정은 대교홀딩스 관리자가 초대(invite)한 @daekyo.co.kr 이메일로만 생성됩니다.
      계정이 없다면 지주사 담당자에게 문의해주세요.
    </p>
  </div>

<script src="js/common.js"></script>
<script>
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = "dashboard.html";
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("error-msg");
  errEl.classList.add("hidden");

  if (!email.toLowerCase().endsWith("@" + window.ALLOWED_EMAIL_DOMAIN)) {
    errEl.textContent = `@${window.ALLOWED_EMAIL_DOMAIN} 이메일만 로그인할 수 있습니다.`;
    errEl.classList.remove("hidden");
    return;
  }

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = "로그인 실패: " + error.message;
    errEl.classList.remove("hidden");
    return;
  }
  window.location.href = "dashboard.html";
});

document.getElementById("reset-btn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if (!email) { alert("이메일을 먼저 입력해주세요."); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname.replace("index.html","") + "reset-password.html"
  });
  if (error) alert("오류: " + error.message);
  else alert("비밀번호 재설정 이메일을 발송했습니다.");
});
</script>
</body>
</html>
