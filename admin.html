<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>계정 관리 | 대교홀딩스 SMART</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="js/design.css" />
<script src="js/config.js"></script>
</head>
<body class="min-h-screen">
<div id="nav-root"></div>
<div class="max-w-4xl mx-auto px-4 py-6 space-y-4">
  <h1 class="text-lg font-bold text-slate-800">계정 관리</h1>
  <p class="text-xs text-slate-500">
    새 계정은 Supabase 대시보드(Authentication → Users → Invite user)에서 @daekyo.co.kr 이메일로 초대해야 합니다.
    초대된 계정은 아래 목록에 자동으로 나타나며, 여기서 소속 계열사와 역할을 지정하세요.
  </p>
  <div class="card overflow-x-auto">
    <table class="w-full text-sm">
      <thead><tr class="text-left text-xs text-slate-400 border-b border-slate-200">
        <th class="py-2 px-3">이메일</th><th class="py-2 px-3">이름</th><th class="py-2 px-3">소속 계열사</th><th class="py-2 px-3">역할</th><th class="py-2 px-3"></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>
<script src="js/common.js"></script>
<script src="js/nav.js"></script>
<script>
let PROFILE, COMPANIES = [];
(async function init() {
  PROFILE = await requireAuth();
  if (!PROFILE) return;
  if (!isHoldcoEditor(PROFILE)) { document.body.innerHTML = "<p class='p-6 text-red-600'>접근 권한이 없습니다.</p>"; return; }
  renderNav(PROFILE, "admin");
  const { data: companies } = await sb.from("companies").select("*").order("is_holding", { ascending: false }).order("name");
  COMPANIES = companies || [];
  await load();
})();

async function load() {
  const { data: profiles, error } = await sb.from("profiles").select("*").order("created_at");
  if (error) { console.error(error); return; }
  document.getElementById("rows").innerHTML = profiles.map(p => `
    <tr class="border-b border-slate-100" data-id="${p.id}">
      <td class="py-2 px-3">${escapeHtml(p.email)}</td>
      <td class="py-2 px-3"><input class="name-input border border-slate-300 rounded px-2 py-1 text-sm w-32" value="${escapeHtml(p.name||'')}" /></td>
      <td class="py-2 px-3">
        <select class="company-select border border-slate-300 rounded px-2 py-1 text-sm">
          <option value="">-</option>
          ${COMPANIES.map(c => `<option value="${c.id}" ${p.company_id===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join("")}
        </select>
      </td>
      <td class="py-2 px-3">
        <select class="role-select border border-slate-300 rounded px-2 py-1 text-sm">
          <option value="company_staff" ${p.role==='company_staff'?'selected':''}>계열사 담당자</option>
          <option value="holdco_staff" ${p.role==='holdco_staff'?'selected':''}>지주사 담당자/관리자</option>
          <option value="holdco_exec" ${p.role==='holdco_exec'?'selected':''}>지주사 경영진(조회전용)</option>
        </select>
      </td>
      <td class="py-2 px-3"><button class="save-btn text-xs bg-[#3a4356] text-white rounded px-3 py-1">저장</button></td>
    </tr>`).join("");

  document.querySelectorAll(".save-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const tr = e.target.closest("tr");
      const id = tr.dataset.id;
      const name = tr.querySelector(".name-input").value;
      const company_id = tr.querySelector(".company-select").value || null;
      const role = tr.querySelector(".role-select").value;
      const { error } = await sb.from("profiles").update({ name, company_id, role }).eq("id", id);
      if (error) alert("저장 실패: " + error.message); else alert("저장되었습니다.");
    });
  });
}
</script>
</body>
</html>
